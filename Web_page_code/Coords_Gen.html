<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Picture/Repeating_Command_Block.png" type="image/png">
    <title>南风工具箱</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/streamsaver@2.0.6/StreamSaver.min.js"></script>
    <link rel="stylesheet" href="../css/global.css">
    <style>
    </style>
    <script src="../js/particles.js"></script>
    <script src="../js/baidu_statistics.js"></script>
</head>
<body>
    <div class="main-card">
    <canvas id="canvas"></canvas>
        <h1>FUNCTION 坐标生成工具</h1>

        <div class="mode-controls">
            <button id="toggleBtn" class="btn" aria-label="切换模式">切换到方形模式</button>
            <button id="generateBtn" disabled aria-label="生成指令">生成指令下载</button>
            <span id="fileCountHint" class="hint" aria-live="polite">0个文件</span>
        </div>

        <!-- 圆形模式面板 -->
        <div id="circlePanel" class="mode-panel active">
            <div class="input-group">
                <label for="circleCenter">圆心三维坐标（格式：x y z）</label>
                <input type="text" id="circleCenter" placeholder="例: 76 -51 0" aria-describedby="circleCenterHelp">
            </div>
            <div class="input-group">
                <label for="circleRadius">圆的半径（1-600）</label>
                <input type="number" id="circleRadius" value="1" min="1" max="600">
            </div>
            <div class="input-group">
                <label for="circleTarget">复制目标坐标（格式：x y z）</label>
                <input type="text" id="circleTarget" placeholder="例: 20 -50 20" aria-describedby="circleTargetHelp">
            </div>
            <div class="input-group">
                <label for="circleScore">起始分数（距离越远分数越高）</label>
                <input type="number" id="circleScore" value="1" min="1">
            </div>
        </div>

        <!-- 方形模式面板 -->
        <div id="squarePanel" class="mode-panel">
            <div class="input-group">
                <label for="squareStart">对角线坐标 1（格式：x y z）</label>
                <input type="text" id="squareStart" placeholder="例: 76 -51 0">
            </div>
            <div class="input-group">
                <label for="squareEnd">对角线坐标 2（格式：x y z）</label>
                <input type="text" id="squareEnd" placeholder="例: 60 -60 16">
            </div>
            <div class="input-group">
                <label for="squareTarget">复制目标坐标（格式：x y z）</label>
                <input type="text" id="squareTarget" placeholder="例: 20 -50 20">
            </div>
            <div class="input-group">
                <label for="squareScore">起始分数（偏移越大分数越高）</label>
                <input type="number" id="squareScore" value="1" min="1">
            </div>
            <div class="input-group">
                <label for="squareStartCorner">起始角（最先出现，分数最低）</label>
                <select id="squareStartCorner">
                    <option value="southeast-top">东南上角</option>
                    <option value="southeast-bottom">东南下角</option>
                    <option value="northeast-top">东北上角</option>
                    <option value="northeast-bottom">东北下角</option>
                    <option value="southwest-top">西南上角</option>
                    <option value="southwest-bottom">西南下角</option>
                    <option value="northwest-top">西北上角</option>
                    <option value="northwest-bottom">西北下角</option>
                </select>
            </div>
        </div>

        <!-- 扩散模式面板 -->
        <div id="diffusePanel" class="mode-panel">
            <div class="input-group">
                <label for="diffuseCube1">立方体对角点 1（格式：x y z）</label>
                <input type="text" id="diffuseCube1" placeholder="例: 0 0 0">
            </div>
            <div class="input-group">
                <label for="diffuseCube2">立方体对角点 2（格式：x y z）</label>
                <input type="text" id="diffuseCube2" placeholder="例: 10 6 4">
            </div>
            <div class="input-group">
                <label for="diffuseDistType">扩散距离计算方式</label>
                <select id="diffuseDistType">
                    <option value="manhattan">曼哈顿距离（沿轴步数，适合网格）</option>
                    <option value="euclidean">欧氏距离（直线距离，适合圆形）</option>
                </select>
            </div>
            <div class="input-group">
                <label for="diffuseTarget">目标区域起点（格式：x y z）</label>
                <input type="text" id="diffuseTarget" placeholder="例: 20 0 0">
            </div>
            <div class="input-group">
                <label for="diffuseScore">起始分数（外层=起始分，内层依次+1）</label>
                <input type="number" id="diffuseScore" value="1" min="1">
            </div>
        </div>

        <!-- 切片模式面板 -->
        <div id="slicePanel" class="mode-panel">
            <div class="input-group">
                <label for="sliceCube1">立方体对角点 1（格式：x y z）</label>
                <input type="text" id="sliceCube1" placeholder="例: 0 0 0">
            </div>
            <div class="input-group">
                <label for="sliceCube2">立方体对角点 2（格式：x y z）</label>
                <input type="text" id="sliceCube2" placeholder="例: 10 5 3">
            </div>
            <div class="input-group">
                <label for="sliceAxis">切片方向</label>
                <select id="sliceAxis">
                    <option value="z">沿Z轴（生成X-Y平面墙）</option>
                    <option value="y">沿Y轴（生成X-Z平面墙）</option>
                    <option value="x">沿X轴（生成Y-Z平面墙）</option>
                </select>
            </div>
            <div class="input-group">
                <label for="sliceTarget">目标区域起点（格式：x y z）</label>
                <input type="text" id="sliceTarget" placeholder="例: 20 0 0">
            </div>
            <div class="input-group">
                <label for="sliceScore">起始分数（第一面墙=起始分，后续+1）</label>
                <input type="number" id="sliceScore" value="1" min="1">
            </div>
        </div>

        <div class="mode-desc" id="modeDesc" aria-live="polite">
            当前模式：圆形模式（生成圆形区域点，距离圆心越远分数越高）
        </div>


    </div>

    <script>
        class CoordsGenerator {
            constructor() {
                // 模式配置
                this.modes = [
                    { id: 'circle', name: '圆形', next: '方形', desc: '圆形模式（生成圆形区域点，距离圆心越远分数越高）' },
                    { id:'square', name: '方形', next: '扩散', desc: '方形模式（生成方形区域点，偏移越大分数越高）' },
                    { id: 'diffuse', name: '扩散', next: '切片', desc: '扩散模式（从立方体边缘中心向内部扩散，外层分数低、内层高）' },
                    { id:'slice', name: '切片', next: '圆形', desc: '切片模式（将立方体沿轴切片成墙，每面墙分数依次递增）' }
                ];
                this.currentMode = 0;
                this.MAX_COMMANDS = 10000;
                this.isGenerating = false;
                this.BATCH_SIZE = 100000; // 每批处理的命令数
                this.BATCH_DELAY = 0; // 每批处理后的延迟(ms)
                this.MAX_COMMANDS_PER_FILE = 10000; // 每个.mcfunction文件最大命令数（1万条，约1MB）
                this.MAX_FILES_PER_ZIP = 80; // 每个ZIP文件最多包含80个.mcfunction文件（约80万条，约80MB）

                // DOM元素
                this.elements = {
                    toggleBtn: document.getElementById('toggleBtn'),
                    generateBtn: document.getElementById('generateBtn'),
                    countHint: document.getElementById('fileCountHint'),
                    modeDesc: document.getElementById('modeDesc'),
                    panels: {
                        circle: document.getElementById('circlePanel'),
                        square: document.getElementById('squarePanel'),
                        diffuse: document.getElementById('diffusePanel'),
                        slice: document.getElementById('slicePanel')
                    },
                    inputs: this.getAllInputs()
                };

                // 初始化
                this.init();
            }

            // 获取所有输入元素
            getAllInputs() {
                const inputs = {};
                ['circle', 'square', 'diffuse', 'slice'].forEach(mode => {
                    document.querySelectorAll(`#${mode}Panel input, #${mode}Panel select`).forEach(el => {
                        inputs[el.id] = el;
                    });
                });
                return inputs;
            }

            // 初始化应用
            init() {
                this.updateModeUI();
                this.updateCount();
                this.bindEvents();
            }

            // 防抖函数
            debounce(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            }

            // 绑定事件处理
            bindEvents() {
                // 模式切换按钮
                this.elements.toggleBtn.addEventListener('click', () => this.toggleMode());

                // 生成按钮
                this.elements.generateBtn.addEventListener('click', () => this.generateCommands());

                // 输入事件监听
                Object.values(this.elements.inputs).forEach(input => {
                    input.addEventListener('input', this.debounce(() => this.updateCount(), 300));
                    input.addEventListener('change', () => this.updateCount());
                });

                // 圆形半径输入限制（最多3位数字）
                this.elements.inputs.circleRadius.addEventListener('input', (e) => {
                    const value = e.target.value;
                    // 限制最多3位数字
                    if (value.length > 3) {
                        e.target.value = value.slice(0, 3);
                    }
                });

                // 起始分数输入限制（最多4位数字，最高1000）
                const scoreInputs = ['circleScore', 'squareScore', 'diffuseScore', 'sliceScore'];
                scoreInputs.forEach(id => {
                    this.elements.inputs[id].addEventListener('input', (e) => {
                        const value = e.target.value;
                        // 限制最多4位数字
                        if (value.length > 4) {
                            e.target.value = value.slice(0, 4);
                        }
                    });
                });
            }

            // 切换模式
            toggleMode() {
                this.currentMode = (this.currentMode + 1) % 4;
                this.updateModeUI();
                this.updateCount();
                // 焦点管理
                const firstInput = this.elements.panels[this.modes[this.currentMode].id].querySelector('input, select');
                if (firstInput) firstInput.focus();
            }

            // 更新模式UI
            updateModeUI() {
                const mode = this.modes[this.currentMode];

                // 更新面板显示
                Object.values(this.elements.panels).forEach(panel => {
                    panel.classList.remove('active');
                });
                this.elements.panels[mode.id].classList.add('active');

                // 更新按钮文本
                this.elements.toggleBtn.textContent = `切换到${mode.next}模式`;
                this.elements.toggleBtn.setAttribute('aria-label', `切换到${mode.next}模式`);

                // 更新描述
                this.elements.modeDesc.textContent = mode.desc;
            }

            // 验证坐标格式
            validateCoord(str) {
                return /^-?\d+\s+-?\d+\s+-?\d+$/.test(str.trim());
            }

            // 解析坐标
            parseCoord(str) {
                return str.trim().split(/\s+/).map(Number);
            }

            // 更新计数显示
            updateCount() {
                let count = 0;
                let valid = true;

                switch(this.currentMode) {
                    case 0: // 圆形
                        valid = this.validateCircleInputs();
                        count = valid ? this.calculateCircleCount() : 0;
                        break;
                    case 1: // 方形
                        valid = this.validateSquareInputs();
                        count = valid ? this.calculateSquareCount() : 0;
                        break;
                    case 2: // 扩散
                        valid = this.validateDiffuseInputs();
                        count = valid ? this.calculateDiffuseCount() : 0;
                        break;
                    case 3: // 切片
                        valid = this.validateSliceInputs();
                        count = valid ? this.calculateSliceCount() : 0;
                        break;
                }

                // 更新生成按钮状态
                this.elements.generateBtn.disabled = !valid || this.isGenerating;

                // 更新计数显示
                const files = valid ? Math.ceil(count / this.MAX_COMMANDS) : 0;
                this.elements.countHint.textContent = files === 0 ? "0 文件" : `${files} 文件`;     
            }

            // 验证圆形模式输入
            validateCircleInputs() {
                const { circleCenter, circleTarget, circleRadius, circleScore } = this.elements.inputs;
                return this.validateCoord(circleCenter.value) && 
                       this.validateCoord(circleTarget.value) && 
                       !isNaN(parseInt(circleRadius.value)) && 
                       circleRadius.value >= 1 && circleRadius.value <= 600 &&
                       !isNaN(parseInt(circleScore.value)) && circleScore.value >= 1;
            }

            // 计算圆形模式数量
            calculateCircleCount() {
                const radius = parseInt(this.elements.inputs.circleRadius.value);
                return Math.round(4/3 * Math.PI * radius**3 * 0.75);
            }

            // 验证方形模式输入
            validateSquareInputs() {
                const { squareStart, squareEnd, squareTarget, squareScore } = this.elements.inputs;
                return this.validateCoord(squareStart.value) && 
                       this.validateCoord(squareEnd.value) && 
                       this.validateCoord(squareTarget.value) && 
                       !isNaN(parseInt(squareScore.value)) && squareScore.value >= 1;
            }

            // 计算方形模式数量
            calculateSquareCount() {
                const [x1,y1,z1] = this.parseCoord(this.elements.inputs.squareStart.value);
                const [x2,y2,z2] = this.parseCoord(this.elements.inputs.squareEnd.value);
                const dx = Math.abs(x2-x1), dy = Math.abs(y2-y1), dz = Math.abs(z2-z1);
                return (dx+1)*(dy+1)*(dz+1);
            }

            // 验证扩散模式输入
            validateDiffuseInputs() {
                const { diffuseCube1, diffuseCube2, diffuseTarget, diffuseScore } = this.elements.inputs;
                return this.validateCoord(diffuseCube1.value) && 
                       this.validateCoord(diffuseCube2.value) && 
                       this.validateCoord(diffuseTarget.value) && 
                       !isNaN(parseInt(diffuseScore.value)) && diffuseScore.value >= 1;
            }

            // 计算扩散模式数量
            calculateDiffuseCount() {
                const [x1,y1,z1] = this.parseCoord(this.elements.inputs.diffuseCube1.value);
                const [x2,y2,z2] = this.parseCoord(this.elements.inputs.diffuseCube2.value);
                const dx = Math.abs(x2-x1), dy = Math.abs(y2-y1), dz = Math.abs(z2-z1);
                return (dx+1)*(dy+1)*(dz+1);
            }

            // 验证切片模式输入
            validateSliceInputs() {
                const { sliceCube1, sliceCube2, sliceTarget, sliceScore, sliceAxis } = this.elements.inputs;
                return this.validateCoord(sliceCube1.value) && 
                       this.validateCoord(sliceCube2.value) && 
                       this.validateCoord(sliceTarget.value) && 
                       !isNaN(parseInt(sliceScore.value)) && sliceScore.value >= 1 &&
                       ['x', 'y', 'z'].includes(sliceAxis.value);
            }

            // 计算切片模式数量
            calculateSliceCount() {
                const [x1,y1,z1] = this.parseCoord(this.elements.inputs.sliceCube1.value);
                const [x2,y2,z2] = this.parseCoord(this.elements.inputs.sliceCube2.value);
                const axis = this.elements.inputs.sliceAxis.value;
                return axis === 'x' ? Math.abs(x2-x1)+1 : 
                       axis === 'y' ? Math.abs(y2-y1)+1 : Math.abs(z2-z1)+1;
            }

            // 生成指令
            async generateCommands() {
                if (this.isGenerating) return;

                this.isGenerating = true;
                this.updateGenerateButton(true);
                const mode = this.modes[this.currentMode];
            
                try {
                    let result;
                    switch(this.currentMode) {
                        case 0:
                            result = await this.generateCircle(mode);
                            break;
                        case 1:
                            result = await this.generateSquare(mode);
                            break;
                        case 2:
                            result = await this.generateDiffuse(mode);
                            break;
                        case 3:
                            result = await this.generateSlice(mode);
                            break;
                    }
                    if (result) alert(result);
                } catch (err) {
                    console.error('生成失败:', err);
                    alert('生成失败: ' + err.message);
                } finally {
                    this.isGenerating = false;
                    this.updateGenerateButton(false);
                }
            }

            // 更新生成按钮状态
            updateGenerateButton(isLoading) {
                if (isLoading) {
                    this.elements.generateBtn.innerHTML = '<span class="loading"></span>生成中...';
                    this.elements.generateBtn.disabled = true;
                } else {
                    this.elements.generateBtn.textContent = '生成指令下载';
                    this.elements.generateBtn.disabled = false;
                }
            }

            // 延迟函数
            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            // 圆形模式生成（流式写入）
            async generateCircle(mode) {
                const center = this.parseCoord(this.elements.inputs.circleCenter.value);
                const radius = parseInt(this.elements.inputs.circleRadius.value);
                const target = this.parseCoord(this.elements.inputs.circleTarget.value);
                const scoreStart = parseInt(this.elements.inputs.circleScore.value);
                const [cx, cy, cz] = center;
                const [tx, ty, tz] = target;
                
                // 流式生成并打包
                const generator = async function*() {
                    yield 'scoreboard objectives add 分数 dummy "分数"';
                    
                    for (let x = -radius; x <= radius; x++) {
                        for (let y = -radius; y <= radius; y++) {
                            const x2y2 = x*x + y*y;
                            if (x2y2 > radius*radius) continue;
                            const maxZ = Math.floor(Math.sqrt(radius*radius - x2y2));
                            for (let z = -maxZ; z <= maxZ; z++) {
                                const realX = cx + x;
                                const realY = cy + y;
                                const realZ = cz + z;
                                const dist = Math.sqrt(x*x + y*y + z*z);
                                const score = Math.max(1, Math.round(scoreStart + dist));
                                yield `execute @a[scores={分数=${score}}] ~ ~ ~ clone ${realX} ${realY} ${realZ} ${realX} ${realY} ${realZ} ${tx + x} ${ty + y} ${tz + z} replace normal`;
                            }
                        }
                    }
                };

                return this.streamPackageCommands(generator(), mode.id);
            }

            // 方形模式生成（流式写入）
            async generateSquare(mode) {
                const start = this.parseCoord(this.elements.inputs.squareStart.value);
                const end = this.parseCoord(this.elements.inputs.squareEnd.value);
                const target = this.parseCoord(this.elements.inputs.squareTarget.value);
                const scoreStart = parseInt(this.elements.inputs.squareScore.value);
                const startCorner = this.elements.inputs.squareStartCorner.value;
                
                const [x1, y1, z1] = start;
                const [x2, y2, z2] = end;
                const [tx, ty, tz] = target;
                
                const minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
                const minY = Math.min(y1, y2), maxY = Math.max(y1, y2);
                const minZ = Math.min(z1, z2), maxZ = Math.max(z1, z2);
                
                // 根据选择的起始角确定起始坐标
                let startX, startY, startZ;
                switch (startCorner) {
                    case 'southeast-top':
                        startX = maxX; startY = maxY; startZ = maxZ;
                        break;
                    case 'southeast-bottom':
                        startX = maxX; startY = minY; startZ = maxZ;
                        break;
                    case 'northeast-top':
                        startX = maxX; startY = maxY; startZ = minZ;
                        break;
                    case 'northeast-bottom':
                        startX = maxX; startY = minY; startZ = minZ;
                        break;
                    case 'southwest-top':
                        startX = minX; startY = maxY; startZ = maxZ;
                        break;
                    case 'southwest-bottom':
                        startX = minX; startY = minY; startZ = maxZ;
                        break;
                    case 'northwest-top':
                        startX = minX; startY = maxY; startZ = minZ;
                        break;
                    case 'northwest-bottom':
                        startX = minX; startY = minY; startZ = minZ;
                        break;
                    default:
                        startX = maxX; startY = maxY; startZ = maxZ;
                }
                
                // 流式生成并打包
                const generator = async function*() {
                    yield 'scoreboard objectives add 分数 dummy 分数';
                    
                    for (let x = minX; x <= maxX; x++) {
                        for (let y = minY; y <= maxY; y++) {
                            for (let z = minZ; z <= maxZ; z++) {
                                const offset = Math.abs(x - startX) + Math.abs(y - startY) + Math.abs(z - startZ);
                                const score = scoreStart + offset;
                                yield `execute @a[scores={分数=${score}}] ~ ~ ~ clone ${x} ${y} ${z} ${x} ${y} ${z} ${tx + (x - minX)} ${ty + (y - minY)} ${tz + (z - minZ)} replace normal`;
                            }
                        }
                    }
                };

                return this.streamPackageCommands(generator(), mode.id);
            }

            // 扩散模式生成（流式写入）
            async generateDiffuse(mode) {
                const cube1 = this.parseCoord(this.elements.inputs.diffuseCube1.value);
                const cube2 = this.parseCoord(this.elements.inputs.diffuseCube2.value);
                const target = this.parseCoord(this.elements.inputs.diffuseTarget.value);
                const scoreStart = parseInt(this.elements.inputs.diffuseScore.value);
                const distType = this.elements.inputs.diffuseDistType.value;
                const [x1, y1, z1] = cube1;
                const [x2, y2, z2] = cube2;
                const [tx, ty, tz] = target;
                
                const minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
                const minY = Math.min(y1, y2), maxY = Math.max(y1, y2);
                const minZ = Math.min(z1, z2), maxZ = Math.max(z1, z2);
                const centerX = Math.floor((minX + maxX) / 2);
                const centerY = Math.floor((minY + maxY) / 2);
                const centerZ = Math.floor((minZ + maxZ) / 2);
                
                // 扩散模式需要先收集所有点到内存
                const pointCount = (maxX - minX + 1) * (maxY - minY + 1) * (maxZ - minZ + 1);
                if (pointCount > 5000000) { // 500万以上直接拒绝
                    throw new Error('扩散模式需要先收集所有点到内存，请减小区域范围（建议不超过500万个点）');
                }
                if (pointCount > 1000000) { // 100万-500万警告
                    const confirmed = confirm(`扩散模式需要先收集 ${pointCount.toLocaleString()} 个点到内存，可能导致浏览器变慢！\n\n是否继续？`);
                    if (!confirmed) throw new Error('用户取消');
                }
                
                // 先收集所有点（扩散模式需要排序）
                const points = [];
                for (let x = minX; x <= maxX; x++) {
                    for (let y = minY; y <= maxY; y++) {
                        for (let z = minZ; z <= maxZ; z++) {
                            const edgeCenterX = x < centerX ? minX : maxX;
                            const edgeCenterY = y < centerY ? minY : maxY;
                            const edgeCenterZ = z < centerZ ? minZ : maxZ;
                            
                            let distance;
                            if (distType === 'manhattan') {
                                distance = Math.abs(x - edgeCenterX) + Math.abs(y - edgeCenterY) + Math.abs(z - edgeCenterZ);
                            } else {
                                distance = Math.sqrt(
                                    Math.pow(x - edgeCenterX, 2) + 
                                    Math.pow(y - edgeCenterY, 2) + 
                                    Math.pow(z - edgeCenterZ, 2)
                                );
                            }
                            
                            points.push({x, y, z, distance});
                        }
                    }
                }
                
                // 按距离排序
                points.sort((a, b) => a.distance - b.distance);
                const uniqueDistances = [...new Set(points.map(p => p.distance))].sort((a, b) => a - b);
                const distanceScores = new Map();
                uniqueDistances.forEach((dist, index) => {
                    distanceScores.set(dist, scoreStart + index);
                });
                
                // 流式生成并打包
                const generator = async function*() {
                    yield 'scoreboard objectives add 分数 dummy "分数"';
                    
                    for (const point of points) {
                        const score = distanceScores.get(point.distance);
                        const dx = point.x - minX;
                        const dy = point.y - minY;
                        const dz = point.z - minZ;
                        yield `execute @a[scores={分数=${score}}] ~ ~ ~ clone ${point.x} ${point.y} ${point.z} ${point.x} ${point.y} ${point.z} ${tx + dx} ${ty + dy} ${tz + dz} replace normal`;
                    }
                };
                
                return this.streamPackageCommands(generator(), mode.id);
            }

            // 切片模式生成（流式写入）
            async generateSlice(mode) {
                const cube1 = this.parseCoord(this.elements.inputs.sliceCube1.value);
                const cube2 = this.parseCoord(this.elements.inputs.sliceCube2.value);
                const target = this.parseCoord(this.elements.inputs.sliceTarget.value);
                const scoreStart = parseInt(this.elements.inputs.sliceScore.value);
                const axis = this.elements.inputs.sliceAxis.value;
                
                const [x1, y1, z1] = cube1;
                const [x2, y2, z2] = cube2;
                const [tx, ty, tz] = target;
                
                const minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
                const minY = Math.min(y1, y2), maxY = Math.max(y1, y2);
                const minZ = Math.min(z1, z2), maxZ = Math.max(z1, z2);
                
                // 流式生成并打包
                const generator = async function*() {
                    yield 'scoreboard objectives add 分数 dummy "分数"';
                    
                    if (axis === 'x') {
                        for (let x = minX; x <= maxX; x++) {
                            const score = scoreStart + (x - minX);
                            for (let y = minY; y <= maxY; y++) {
                                for (let z = minZ; z <= maxZ; z++) {
                                    yield `execute @a[scores={分数=${score}}] ~ ~ ~ clone ${x} ${y} ${z} ${x} ${y} ${z} ${tx + (x - minX)} ${ty + (y - minY)} ${tz + (z - minZ)} replace normal`;
                                }
                            }
                        }
                    } else if (axis === 'y') {
                        for (let y = minY; y <= maxY; y++) {
                            const score = scoreStart + (y - minY);
                            for (let x = minX; x <= maxX; x++) {
                                for (let z = minZ; z <= maxZ; z++) {
                                    yield `execute @a[scores={分数=${score}}] ~ ~ ~ clone ${x} ${y} ${z} ${x} ${y} ${z} ${tx + (x - minX)} ${ty + (y - minY)} ${tz + (z - minZ)} replace normal`;
                                }
                            }
                        }
                    } else {
                        for (let z = minZ; z <= maxZ; z++) {
                            const score = scoreStart + (z - minZ);
                            for (let x = minX; x <= maxX; x++) {
                                for (let y = minY; y <= maxY; y++) {
                                    yield `execute @a[scores={分数=${score}}] ~ ~ ~ clone ${x} ${y} ${z} ${x} ${y} ${z} ${tx + (x - minX)} ${ty + (y - minY)} ${tz + (z - minZ)} replace normal`;
                                }
                            }
                        }
                    }
                };

                return this.streamPackageCommands(generator(), mode.id);
            }

            // 流式打包命令为ZIP文件（支持超大命令量，分批下载）
            async streamPackageCommands(generator, modeName) {
                let zip = new JSZip();
                let currentFileCommands = [];
                let fileIndex = 1;
                let zipIndex = 1;
                let totalCommands = 0;
                let filesInCurrentZip = 0;
                let commandsInCurrentFile = 0;
                
                for await (const command of generator) {
                    currentFileCommands.push(command);
                    totalCommands++;
                    commandsInCurrentFile++;
                    
                    // 当当前文件达到最大命令数时，创建新文件
                    if (commandsInCurrentFile >= this.MAX_COMMANDS_PER_FILE) {
                        const fileName = `coords_${modeName}_${fileIndex}.mcfunction`;
                        zip.file(fileName, currentFileCommands.join('\n'));
                        currentFileCommands = [];
                        commandsInCurrentFile = 0;
                        fileIndex++;
                        filesInCurrentZip++;
                        
                        // 当达到每个ZIP的最大文件数时，保存并创建新ZIP
                        if (filesInCurrentZip >= this.MAX_FILES_PER_ZIP) {
                            console.log(`正在下载第 ${zipIndex} 个ZIP文件...`);
                            const blob = await zip.generateAsync({type: 'blob'});
                            saveAs(blob, `coords_${modeName}_part${zipIndex}_${new Date().getTime()}.zip`);
                            
                            // 创建新的ZIP对象，释放内存
                            zip = new JSZip();
                            filesInCurrentZip = 0;
                            zipIndex++;
                            
                            // 让出控制权，避免阻塞
                            await this.delay(500);
                        }
                        
                        // 每处理一批让出控制权
                        if (totalCommands % 10000 === 0) {
                            await this.delay(0);
                        }
                        
                        // 每1000个文件显示一次进度
                        if (fileIndex % 1000 === 0) {
                            console.log(`已生成 ${fileIndex} 个文件，${totalCommands.toLocaleString()} 条命令...`);
                        }
                    }
                }
                
                // 处理剩余命令
                if (currentFileCommands.length > 0) {
                    const fileName = `coords_${modeName}_${fileIndex}.mcfunction`;
                    zip.file(fileName, currentFileCommands.join('\n'));
                }
                
                // 保存最后一个ZIP（如果有内容）
                if (Object.keys(zip.files).length > 0) {
                    console.log(`正在下载第 ${zipIndex} 个ZIP文件...`);
                    const blob = await zip.generateAsync({type: 'blob'});
                    saveAs(blob, `coords_${modeName}_part${zipIndex}_${new Date().getTime()}.zip`);
                }
                
                return `成功生成 ${zipIndex} 个ZIP文件，共 ${fileIndex} 个.mcfunction文件，${totalCommands.toLocaleString()} 条命令`;
            }
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            new CoordsGenerator();
            
        });
    </script>
</body>
