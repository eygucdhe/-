<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南风工具箱</title>
    <link rel="icon" href="../Picture/Repeating_Command_Block.png" type="image/webp">
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <link rel="stylesheet" href="../css/global.css">
    <script src="../js/particles.js"></script>
    <script src="../js/baidu_statistics.js"></script>
    <style>
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="main-card">
        <h1>FUNCTION 文字粒子生成工具</h1>
        <div class="button-container">
            <button id="hollowModeButton" class="btn">空心文字模式</button>
            <button id="generateButton" disabled>生成并下载文件</button>
            <span id="fileCountHint" class="hint" aria-live="polite">0 个文件</span>
        </div>

        <div class="input-group">
            <label for="textInput">请输入要生成的文字：</label>
            <textarea id="textInput" placeholder="在此处输入需要生成粒子效果的文本" style="height: 120px; resize: vertical;"></textarea>
        </div>

        <div class="input-group">
            <label>
                文字大小：
                <input type="number" id="fontSize" value="36" min="1" placeholder="1-100" oninput="updatePreview()"> px
            </label>
        </div>

        <div class="input-group">
            <label>
                粒子密度：
                <input type="number" id="particleDensity" value="4" min="0.1" step="0.1" placeholder="0.1-10" oninput="updatePreview()"> 
                （值越小粒子越密集）
            </label>
        </div>
        
        <div class="input-group">
            <label>
                坐标偏移（X Y Z）：
                <input type="text" id="coordinates" placeholder="例如：10 5 3" oninput="validateCoordinates()">
                <span style="font-size: 0.8em; color: #666;">输入格式：X Y Z（用空格分隔三个数字）</span>
                <span id="coordinatesError" style="font-size: 0.8em; color: #dc3545; display: none;">坐标格式错误，请输入三个数字用空格分隔</span>
            </label>
        </div>

        <!-- 修改画布宽度，保持高度不变 -->
        <canvas id="textCanvas"></canvas>
        <div class="note">温馨提示：最多支持30个字符，数字和英文可输入更多，中文建议5个一组。当输入达到上限时，将无法继续输入，请合理控制文本长度。</div>
    </div>

    <script>
        // 获取页面元素
        const hollowBtn = document.getElementById('hollowModeButton');
        const generateBtn = document.getElementById('generateButton');
        const textArea = document.getElementById('textInput');
        const fontSizeInput = document.getElementById('fontSize');
        const particleDensityInput = document.getElementById('particleDensity');
        const coordinatesInput = document.getElementById('coordinates');
        const fileCountSpan = document.getElementById('fileCountHint');
        const canvas = document.getElementById('textCanvas');
        const ctx = canvas.getContext('2d');
        
        // 解析坐标输入
        function parseCoordinates() {
            const input = coordinatesInput.value.trim();
            if (!input) {
                return { offsetX: 0, offsetY: 0, offsetZ: 0 };
            }
            const parts = input.split(/\s+/);
            const offsetX = parseFloat(parts[0]) || 0;
            const offsetY = parseFloat(parts[1]) || 0;
            const offsetZ = parseFloat(parts[2]) || 0;
            return { offsetX, offsetY, offsetZ };
        }
        
        // 验证坐标输入
        function validateCoordinates() {
            const input = coordinatesInput.value.trim();
            const errorElement = document.getElementById('coordinatesError');
            
            if (!input) {
                errorElement.style.display = 'none';
                updatePreview();
                return;
            }
            
            const parts = input.split(/\s+/);
            if (parts.length !== 3 || parts.some(part => isNaN(parseFloat(part)))) {
                errorElement.style.display = 'inline';
            } else {
                errorElement.style.display = 'none';
            }
            
            updatePreview();
        }

        let fontSize = 36;
        let particleDensity = 4;
        let isHollowText = false;

        // 检查文本输入并更新按钮状态
        function checkTextInput() {
            const hasText = textArea.value.trim().length > 0;
            generateBtn.disabled =!hasText;
        }

        // 空心模式切换
        hollowBtn.addEventListener('click', function () {
            isHollowText =!isHollowText;
            this.textContent = isHollowText? '实心文字模式' : '空心文字模式';
            updatePreview();
        });

        // 绘制文本到画布的函数
        function drawTextOnCanvas(lines, fontSize, isHollowText) {
            // 获取canvas的实际显示尺寸
            const displayWidth = canvas.clientWidth;
            const displayHeight = displayWidth / 4; // 保持4:1的宽高比
            
            // 设置canvas的绘图尺寸
            canvas.width = displayWidth;
            canvas.height = displayHeight;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 计算左右边距 - 进一步减小边距，让文字更靠近边缘
            const horizontalPadding = 10; // 固定小边距
            const availableWidth = canvas.width - horizontalPadding * 2;
            
            // 调整字体大小以适应画布
            let adjustedFontSize = fontSize;
            let maxWidth = 0;
            
            do {
                ctx.font = `bold ${adjustedFontSize}px Arial`;
                maxWidth = 0;
                lines.forEach(line => {
                    const metrics = ctx.measureText(line);
                    maxWidth = Math.max(maxWidth, metrics.width);
                });
                
                // 如果文本宽度超过可用宽度，减小字体大小
                if (maxWidth > availableWidth && adjustedFontSize > 10) {
                    adjustedFontSize -= 1;
                } else {
                    break;
                }
            } while (true);
            
            const textHeight = adjustedFontSize;
            
            // 居中绘制文本，同时考虑左右边距
            const x = horizontalPadding + (availableWidth - maxWidth) / 2;
            const y = (canvas.height + textHeight) / 2;
            
            ctx.fillStyle = '#333';
            ctx.strokeStyle = '#333';
            
            // 绘制多行文本，增加行高
            const lineHeight = textHeight * 1.5;
            lines.forEach((line, index) => {
                const yPos = y + index * lineHeight - (lines.length - 1) * lineHeight / 2;
                if (isHollowText) {
                    ctx.strokeText(line, x, yPos);
                } else {
                    ctx.fillText(line, x, yPos);
                }
            });
        }

        // 实时预览
        function updatePreview() {
            fontSize = parseInt(fontSizeInput.value);
            particleDensity = parseFloat(particleDensityInput.value);
        
            const inputText = textArea.value;
            let fileCount = 0;
            
            // 检查文本输入并更新按钮状态
            checkTextInput();
            
            if (inputText) {
                const lines = inputText.split('\n');
                
                // 绘制文本到画布
                drawTextOnCanvas(lines, fontSize, isHollowText);
        
                const canvasCopy = document.createElement('canvas');
                const ctxCopy = canvasCopy.getContext('2d');
                
                // 设置canvasCopy的尺寸与主canvas一致
                canvasCopy.width = canvas.width;
                canvasCopy.height = canvas.height;
                ctxCopy.font = `bold ${fontSize}px Arial`;
                
                // 计算文本绘制参数
                let maxWidth = 0;
                lines.forEach(line => {
                    const metrics = ctxCopy.measureText(line);
                    maxWidth = Math.max(maxWidth, metrics.width);
                });
                const textHeight = fontSize;
                
                // 计算左右边距 - 保持与上面一致的计算方式
                const horizontalPadding = canvasCopy.width * 0.1;
                const availableWidth = canvasCopy.width - horizontalPadding * 2;
                const xCopy = horizontalPadding + (availableWidth - maxWidth) / 2;
                const yCopy = (canvasCopy.height + textHeight) / 2;
                
                ctxCopy.fillStyle = '#333';
                ctxCopy.strokeStyle = '#333';
                
                // 绘制多行文本，保持与上面一致的行高
                const lineHeight = textHeight * 1.5;
                lines.forEach((line, index) => {
                    const yPos = yCopy + index * lineHeight - (lines.length - 1) * lineHeight / 2;
                    if (isHollowText) {
                        ctxCopy.strokeText(line, xCopy, yPos);
                    } else {
                        ctxCopy.fillText(line, xCopy, yPos);
                    }
                });
        
                const imageData = ctxCopy.getImageData(0, 0, canvasCopy.width, canvasCopy.height);
                const data = imageData.data;
                let functionContent = '';
                const { offsetX, offsetY, offsetZ } = parseCoordinates();
                
                for (let i = 0; i < data.length; i += 4) {
                    const alpha = data[i + 3];
                    if (alpha > 0) {
                        const x = (i % (canvasCopy.width * 4)) / 4 / particleDensity;
                        const y = (canvasCopy.height - Math.floor(i / (canvasCopy.width * 4))) / particleDensity;
                        functionContent += `particle minecraft:endrod ^${(x + offsetX).toFixed(6)} ^${(y + offsetY).toFixed(6)} ^${offsetZ.toFixed(6)}\n`;
                    }
                }
        
                const commandCount = functionContent.split('\n').length;
                fileCount = commandCount > 0? Math.ceil(commandCount / 10000) : 1;
            } else {
                // 获取canvas的实际显示尺寸
                const displayWidth = canvas.clientWidth;
                const displayHeight = displayWidth / 4; // 保持4:1的宽高比
                
                // 设置canvas的绘图尺寸
                canvas.width = displayWidth;
                canvas.height = displayHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            fileCountSpan.textContent = `${fileCount} 个文件`;
        }

        // 生成指令
        generateBtn.addEventListener('click', async function () {
            const inputText = textArea.value.trim();
            if (!inputText) return; // 额外的安全检查
        
            const fontSizeVal = Math.max(1, parseInt(fontSizeInput.value));
            const particleDensityVal = Math.max(0.1, parseFloat(particleDensityInput.value));
            const particleId = "minecraft:endrod";
        
            const lines = inputText.split('\n');
            
            // 调用绘制文本函数
            drawTextOnCanvas(lines, fontSizeVal, isHollowText);
        
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            let functionContent = '';
        
            const { offsetX, offsetY, offsetZ } = parseCoordinates();
            
            for (let i = 0; i < data.length; i += 4) {
                const alpha = data[i + 3];
                if (alpha > 0) {
                    const x = (i % (canvas.width * 4)) / 4 / particleDensityVal;
                    const y = (canvas.height - Math.floor(i / (canvas.width * 4))) / particleDensityVal;
                    functionContent += `particle ${particleId} ^${(x + offsetX).toFixed(6)} ^${(y + offsetY).toFixed(6)} ^${offsetZ.toFixed(6)}\n`;
                }
            }
        
            const commandCount = functionContent.split('\n').length;
            const fileCount = commandCount > 0? Math.ceil(commandCount / 10000) : 1;
        
            // 创建一个zip文件
            const zip = new JSZip();
            const linesPerFile = 10000;
            
            // 将指令内容按文件拆分并添加到zip
            for (let i = 0; i < commandCount; i += linesPerFile) {
                const fileContent = functionContent.split('\n').slice(i, i + linesPerFile).join('\n');
                zip.file(`particle_commands_${Math.floor(i / linesPerFile) + 1}.mcfunction`, fileContent);
            }
        
            // 生成并下载zip文件
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = 'particle_commands.zip';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        
            // 不显示成功消息
        });



        // 初始化预览
        window.onload = function() {
            checkTextInput();
            updatePreview();
        };
        
        textArea.addEventListener('input', function () {
            // 计算字符数，包括中文
            const charCount = textArea.value.length;
            if (charCount > 30) {
                textArea.value = textArea.value.slice(0, 30);
                // 显示提示
                const note = document.querySelector('.note');
                note.style.color = '#dc3545';
                note.style.fontWeight = 'bold';
                note.textContent = '已达到输入上限（30个字符），请减少输入内容！';
                setTimeout(() => {
                    note.style.color = '';
                    note.style.fontWeight = '';
                    note.textContent = '温馨提示：最多支持30个字符，数字和英文可输入更多，中文建议5个一组。当输入达到上限时，将无法继续输入，请合理控制文本长度。';
                }, 5000);
            }
            checkTextInput(); // 输入变化时检查
            updatePreview();
        });
        fontSizeInput.addEventListener('input', updatePreview);
        particleDensityInput.addEventListener('input', updatePreview);
    </script>
