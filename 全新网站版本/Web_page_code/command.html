<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>楠风工具箱</title>
    <link rel="icon" href="../Picture/Repeating_Command_Block.png" type="image/png">
    <script src="../js/particles.js"></script>
    <script src="../js/baidu_statistics.js"></script>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="main-card">
        <h1>50 关指令挑战</h1>
        <p style="text-align: center; font-size: 1.2em;">当前称号: <span id="current-title">指令新手</span></p>

        <!-- 挑战入口页 -->
        <div id="start-page" class="page mode-panel">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
            </div>
            <p style="text-align: center; font-size: 1.2em;">已完成: <span id="completed-count">0</span>/50 关</p>
            
            <div class="button-container">
                <button id="start-level-1" class="menu-btn">开始挑战第1关</button>
                <button id="achievements-button" class="menu-btn">我的成就</button>
                <button id="levels-button" class="menu-btn">选择关卡</button>
            </div>
        </div>

        <!-- 关卡选择页 -->
        <div id="levels-page" class="page mode-panel">
            <h2>选择关卡</h2>
            <div class="level-grid" id="level-grid"></div>
            <div class="button-container">
                <button id="back-to-start" class="menu-btn">返回</button>
            </div>
        </div>

        <!-- 关卡答题页 -->
        <div id="question-page" class="page mode-panel">
            <h2>关卡 <span id="current-level">1</span></h2>
            <div style="margin: 20px 0;">
                <h3 id="question-title">指令问题</h3>
                <p id="question-text">请输入正确的指令...</p>
                <div class="input-group">
                    <input type="text" id="answer-input" placeholder="输入你的答案...">
                </div>
                <div class="button-container">
                    <button id="submit-button" class="menu-btn">提交</button>
                    <button id="achievements-button-2" class="menu-btn">我的成就</button>
                    <button id="levels-button-2" class="menu-btn">选择关卡</button>
                </div>
                <p id="hint-text" class="hint">提示内容将显示在这里</p>
            </div>
            
            <!-- 进度条 -->
            <div class="progress-container">
                <div id="progress-bar-2" class="progress-bar" style="width: 0%"></div>
            </div>
            <p style="text-align: center; margin-top: 5px;">已完成: <span id="completed-count-2">0</span>/50 关</p>
        </div>

        <!-- 结果展示页 -->
        <div id="result-page" class="page mode-panel">
            <div id="result-container" class="result-container">
                <div id="result-icon" style="font-size: 4rem; margin-bottom: 20px;">✅</div>
                <h2 id="result-message" style="font-size: 1.8rem; margin-bottom: 15px;">恭喜你，回答正确！</h2>
                <p id="result-details">你成功完成了这个关卡。</p>
            </div>
            <div class="button-container">
                <button id="next-level-button" class="menu-btn" style="display: none;">下一关</button>
                <button id="retry-button" class="menu-btn" style="display: none;">重新挑战</button>
                <button id="back-to-levels" class="menu-btn">返回关卡选择</button>
            </div>
        </div>

        <!-- 成就页 -->
        <div id="achievements-page" class="page mode-panel">
            <h2>我的成就</h2>
            <div class="achievement-grid" id="achievement-grid"></div>
            <div class="button-container">
                <button id="back-to-start-2" class="menu-btn">返回</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏数据
        const gameData = {
            currentLevel: 1,
            completedLevels: [],
            currentTitle: "指令新手"
        };

        // 成就数据
        const achievements = [
            { id: 1, title: "初学者", description: "完成第1关", icon: "🎓", unlocked: false },
            { id: 2, title: "进阶者", description: "完成第10关", icon: "🏆", unlocked: false },
            { id: 3, title: "专家", description: "完成第25关", icon: "👑", unlocked: false },
            { id: 4, title: "大师", description: "完成第50关", icon: "🌟", unlocked: false },
            { id: 5, title: "完美主义者", description: "连续答对5题", icon: "💎", unlocked: false }
        ];

        // 50个关卡的数据
        const levels = [
            { id: 1, title: "基础指令", text: "清除所有生物的指令是什么？", answer: "/kill @e", difficulty: "简单", hint: "使用kill指令配合选择器" },
            { id: 2, title: "时间控制", text: "设置时间为正午的指令是什么？", answer: "/time set 6000", difficulty: "简单", hint: "使用time指令，正午是6000tick" },
            { id: 3, title: "天气控制", text: "设置天气为晴天的指令是什么？", answer: "/weather clear", difficulty: "简单", hint: "使用weather指令" },
            { id: 4, title: "游戏模式", text: "切换到创造模式的指令是什么？", answer: "/gamemode creative", difficulty: "简单", hint: "使用gamemode指令" },
            { id: 5, title: "传送指令", text: "传送到坐标(0,64,0)的指令是什么？", answer: "/tp @s 0 64 0", difficulty: "简单", hint: "使用tp指令，@s代表自己" },
            { id: 6, title: "给予物品", text: "给自己64个石头的指令是什么？", answer: "/give @s stone 64", difficulty: "简单", hint: "使用give指令" },
            { id: 7, title: "设置方块", text: "在当前位置放置一个箱子的指令是什么？", answer: "/setblock ~ ~ ~ chest", difficulty: "中等", hint: "使用setblock指令配合相对坐标" },
            { id: 8, title: "填充方块", text: "用石头填充从(0,64,0)到(5,64,5)区域的指令是什么？", answer: "/fill 0 64 0 5 64 5 stone", difficulty: "中等", hint: "使用fill指令" },
            { id: 9, title: "清除方块", text: "清除从(0,64,0)到(5,69,5)区域方块的指令是什么？", answer: "/fill 0 64 0 5 69 5 air", difficulty: "中等", hint: "使用fill指令填充为空气" },
            { id: 10, title: "召唤生物", text: "在当前位置召唤一只僵尸的指令是什么？", answer: "/summon zombie", difficulty: "简单", hint: "使用summon指令" },
            { id: 11, title: "效果指令", text: "给自己速度II效果持续60秒的指令是什么？", answer: "/effect give @s speed 60 1", difficulty: "中等", hint: "使用effect指令，等级从0开始计算" },
            { id: 12, title: "经验指令", text: "给自己100点经验值的指令是什么？", answer: "/xp 100", difficulty: "简单", hint: "使用xp指令" },
            { id: 13, title: "难度设置", text: "设置游戏难度为困难的指令是什么？", answer: "/difficulty hard", difficulty: "简单", hint: "使用difficulty指令" },
            { id: 14, title: "世界边界", text: "设置世界边界为半径1000的指令是什么？", answer: "/worldborder set 1000", difficulty: "中等", hint: "使用worldborder指令" },
            { id: 15, title: "粒子效果", text: "在当前位置显示火焰粒子的指令是什么？", answer: "/particle flame ~ ~ ~", difficulty: "中等", hint: "使用particle指令" },
            { id: 16, title: "音效指令", text: "播放一个爆炸音效的指令是什么？", answer: "/playsound entity.generic.explode master @s", difficulty: "困难", hint: "使用playsound指令" },
            { id: 17, title: "标题指令", text: "给所有玩家显示一个大标题\"你好\"的指令是什么？", answer: "/title @a title {\"text\":\"你好\"}", difficulty: "困难", hint: "使用title指令，需要JSON格式" },
            { id: 18, title: "记分板", text: "创建一个名为\"coins\"的目标的指令是什么？", answer: "/scoreboard objectives add coins dummy", difficulty: "困难", hint: "使用scoreboard objectives指令" },
            { id: 19, title: "执行指令", text: "以最近玩家的身份执行给予钻石的指令是什么？", answer: "/execute at @p run give @p diamond", difficulty: "困难", hint: "使用execute指令" },
            { id: 20, title: "战利品表", text: "给玩家掉落一个钻石剑的战利品表的指令是什么？", answer: "/loot give @s loot minecraft:chests/simple_dungeon", difficulty: "专家", hint: "使用loot指令" },
            { id: 21, title: "记分板操作", text: "给名为\"coins\"的目标添加10分的指令是什么？", answer: "/scoreboard players add @s coins 10", difficulty: "中等", hint: "使用scoreboard players指令" },
            { id: 22, title: "传送至实体", text: "传送到最近的玩家的指令是什么？", answer: "/tp @s @p", difficulty: "简单", hint: "使用tp指令配合选择器" },
            { id: 23, title: "时间查询", text: "查询当前游戏时间的指令是什么？", answer: "/time query daytime", difficulty: "简单", hint: "使用time query指令" },
            { id: 24, title: "天气查询", text: "查询当前天气的指令是什么？", answer: "/weather query", difficulty: "简单", hint: "使用weather指令" },
            { id: 25, title: "清除效果", text: "清除自己所有效果的指令是什么？", answer: "/effect clear @s", difficulty: "简单", hint: "使用effect clear指令" },
            { id: 26, title: "设置出生点", text: "设置当前位置为出生点的指令是什么？", answer: "/spawnpoint @s", difficulty: "简单", hint: "使用spawnpoint指令" },
            { id: 27, title: "传送至坐标", text: "传送到坐标(100,64,100)的指令是什么？", answer: "/tp @s 100 64 100", difficulty: "简单", hint: "使用tp指令" },
            { id: 28, title: "填充方块变种", text: "用橡木木板填充从(0,64,0)到(3,64,3)区域的指令是什么？", answer: "/fill 0 64 0 3 64 3 oak_planks", difficulty: "中等", hint: "使用fill指令" },
            { id: 29, title: "召唤带装备的生物", text: "召唤一只持有钻石剑的僵尸的指令是什么？", answer: "/summon zombie ~ ~ ~ {HandItems:[{id:\"minecraft:diamond_sword\",Count:1b},{}]}", difficulty: "困难", hint: "使用summon指令配合NBT数据" },
            { id: 30, title: "给予附魔物品", text: "给自己一个附魔锋利V的钻石剑的指令是什么？", answer: "/give @s diamond_sword{Enchantments:[{id:\"minecraft:sharpness\",lvl:5s}]}", difficulty: "困难", hint: "使用give指令配合NBT数据" },
            { id: 31, title: "执行位置", text: "在坐标(0,64,0)处放置一个箱子的指令是什么？", answer: "/execute positioned 0 64 0 run setblock ~ ~ ~ chest", difficulty: "困难", hint: "使用execute positioned指令" },
            { id: 32, title: "执行以实体", text: "以最近的牛为基准召唤一只猪的指令是什么？", answer: "/execute at @e[type=cow,limit=1] run summon pig", difficulty: "困难", hint: "使用execute at指令" },
            { id: 33, title: "战利品表指定位置", text: "在坐标(0,64,0)处生成一个战利品箱的指令是什么？", answer: "/loot spawn 0 64 0 loot minecraft:chests/simple_dungeon", difficulty: "专家", hint: "使用loot spawn指令" },
            { id: 34, title: "结构方块保存", text: "保存一个名为\"my_structure\"的结构的指令是什么？", answer: "/structure save my_structure", difficulty: "专家", hint: "使用structure save指令" },
            { id: 35, title: "结构方块加载", text: "加载一个名为\"my_structure\"的结构的指令是什么？", answer: "/structure load my_structure ~ ~ ~", difficulty: "专家", hint: "使用structure load指令" },
            { id: 36, title: "粒子效果变种", text: "在当前位置显示爱心粒子的指令是什么？", answer: "/particle heart ~ ~ ~", difficulty: "中等", hint: "使用particle指令" },
            { id: 37, title: "音效指令变种", text: "播放一个雷鸣音效的指令是什么？", answer: "/playsound entity.lightning_bolt.thunder master @s", difficulty: "困难", hint: "使用playsound指令" },
            { id: 38, title: "标题指令变种", text: "给所有玩家显示一个副标题\"欢迎\"的指令是什么？", answer: "/title @a subtitle {\"text\":\"欢迎\"}", difficulty: "困难", hint: "使用title subtitle指令" },
            { id: 39, title: "记分板显示", text: "在侧边栏显示\"coins\"目标的指令是什么？", answer: "/scoreboard objectives setdisplay sidebar coins", difficulty: "困难", hint: "使用scoreboard objectives setdisplay指令" },
            { id: 40, title: "执行条件", text: "如果自己的gamemode是生存则传送的指令是什么？", answer: "/execute if entity @s[gamemode=survival] run tp @s 0 64 0", difficulty: "专家", hint: "使用execute if entity指令" },
            { id: 41, title: "战利品表指定战利品", text: "给自己掉落一个村庄铁匠铺战利品的指令是什么？", answer: "/loot give @s loot minecraft:chests/village/village_weaponsmith", difficulty: "专家", hint: "使用loot指令" },
            { id: 42, title: "传送至实体面向", text: "传送到最近玩家并面向它的指令是什么？", answer: "/tp @s @p facing entity @p feet", difficulty: "专家", hint: "使用tp facing指令" },
            { id: 43, title: "填充方块替换", text: "将区域内所有石头替换为花岗岩的指令是什么？", answer: "/fill 0 64 0 5 69 5 granite replace stone", difficulty: "专家", hint: "使用fill replace指令" },
            { id: 44, title: "召唤带标签的实体", text: "召唤一只带有\"my_mob\"标签的牛的指令是什么？", answer: "/summon cow ~ ~ ~ {Tags:[\"my_mob\"]}", difficulty: "专家", hint: "使用summon指令配合Tags NBT" },
            { id: 45, title: "执行存储", text: "将坐标存储到存储中的指令是什么？", answer: "/execute store result storage my_storage:data pos run data get entity @s Pos", difficulty: "专家", hint: "使用execute store result指令" },
            { id: 46, title: "给予药水效果", text: "给自己一个跳跃提升药水的指令是什么？", answer: "/give @s potion{Potion:\"minecraft:long_leaping\"}", difficulty: "专家", hint: "使用give指令配合Potion NBT" },
            { id: 47, title: "记分板玩家操作", text: "将\"coins\"目标的分数设置为100的指令是什么？", answer: "/scoreboard players set @s coins 100", difficulty: "中等", hint: "使用scoreboard players set指令" },
            { id: 48, title: "执行条件变种", text: "如果自己在水中则给予速度的指令是什么？", answer: "/execute if entity @s[inWater=true] run effect give @s speed", difficulty: "专家", hint: "使用execute if entity指令" },
            { id: 49, title: "结构方块变种", text: "删除一个名为\"my_structure\"的结构的指令是什么？", answer: "/structure delete my_structure", difficulty: "专家", hint: "使用structure delete指令" },
            { id: 50, title: "战利品表指定战利品变种", text: "在当前位置生成一个末地城战利品箱的指令是什么？", answer: "/loot spawn ~ ~ ~ loot minecraft:chests/end_city_treasure", difficulty: "专家", hint: "使用loot指令" }
        ];

        // 页面切换函数
        function showPage(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // 显示指定页面
            document.getElementById(pageId).classList.add('active');
        }

        // 加载游戏数据
        function loadGameData() {
            const savedData = localStorage.getItem('mcGameData');
            if (savedData) {
                const data = JSON.parse(savedData);
                gameData.currentLevel = data.currentLevel || 1;
                gameData.completedLevels = data.completedLevels || [];
                gameData.currentTitle = data.currentTitle || "指令新手";
                
                // 更新UI
                document.getElementById('current-title').textContent = gameData.currentTitle;
                document.getElementById('completed-count').textContent = gameData.completedLevels.length;
                document.getElementById('completed-count-2').textContent = gameData.completedLevels.length;
                
                // 更新进度条
                const progress = (gameData.completedLevels.length / 50) * 100;
                document.getElementById('progress-bar').style.width = progress + '%';
                document.getElementById('progress-bar-2').style.width = progress + '%';
            }
        }

        // 保存游戏数据
        function saveGameData() {
            localStorage.setItem('mcGameData', JSON.stringify(gameData));
        }

        // 更新进度条和称号
        function updateProgressBar() {
            const progress = (gameData.completedLevels.length / 50) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-bar-2').style.width = progress + '%';
            
            const completed = gameData.completedLevels.length;
            if (completed >= 50) {
                gameData.currentTitle = "指令大师";
            } else if (completed >= 25) {
                gameData.currentTitle = "指令专家";
            } else if (completed >= 10) {
                gameData.currentTitle = "指令进阶者";
            } else if (completed >= 1) {
                gameData.currentTitle = "指令学者";
            } else {
                gameData.currentTitle = "指令新手";
            }
            
            document.getElementById('current-title').textContent = gameData.currentTitle;
            saveGameData();
        }

        // 渲染关卡网格
        function renderLevelGrid() {
            const grid = document.getElementById('level-grid');
            if (!grid) return;
            
            grid.innerHTML = '';
            
            levels.forEach(level => {
                const levelCard = document.createElement('div');
                levelCard.className = 'level-card';
                
                // 检查是否已完成
                if (gameData.completedLevels.includes(level.id)) {
                    levelCard.classList.add('completed');
                } 
                // 检查是否解锁（前一关完成或第一关）
                else if (level.id > 1 && !gameData.completedLevels.includes(level.id - 1)) {
                    levelCard.classList.add('locked');
                }
                
                levelCard.innerHTML = `
                    <div class="level-number">${level.id}</div>
                    <div class="level-difficulty difficulty-${level.difficulty.toLowerCase()}">${level.difficulty}</div>
                `;
                
                // 添加点击事件（如果不是锁定状态）
                if (!levelCard.classList.contains('locked')) {
                    levelCard.addEventListener('click', () => {
                        // 无论关卡是否已完成，都加载用户点击的关卡
                        loadLevel(level.id);
                    });
                }
                
                grid.appendChild(levelCard);
            });
        }

        // 加载关卡
        function loadLevel(levelId) {
            const level = levels.find(l => l.id === levelId);
            if (!level) return;
            
            gameData.currentLevel = levelId;
            
            // 更新UI
            document.getElementById('current-level').textContent = level.id;
            document.getElementById('question-title').textContent = level.title;
            document.getElementById('question-text').textContent = level.text;
            document.getElementById('answer-input').value = '';
            
            // 显示提示文本
            const hintText = document.getElementById('hint-text');
            if (hintText) {
                hintText.textContent = `提示: ${level.hint}`;
                hintText.style.display = 'block';
            }
            
            // 隐藏结果按钮
            const nextLevelButton = document.getElementById('next-level-button');
            const retryButton = document.getElementById('retry-button');
            if (nextLevelButton) nextLevelButton.style.display = 'none';
            if (retryButton) retryButton.style.display = 'none';
            
            showPage('question-page');
        }

        // 检查答案
        function checkAnswer() {
            const level = levels.find(l => l.id === gameData.currentLevel);
            if (!level) return;
            
            const userAnswer = document.getElementById('answer-input').value.trim();
            const isCorrect = userAnswer === level.answer;
            
            // 更新结果页面
            const resultContainer = document.getElementById('result-container');
            const resultIcon = document.getElementById('result-icon');
            const resultMessage = document.getElementById('result-message');
            const resultDetails = document.getElementById('result-details');
            
            if (resultContainer && resultIcon && resultMessage && resultDetails) {
                if (isCorrect) {
                    resultContainer.className = 'result-container result-success';
                    resultIcon.textContent = '✅';
                    resultMessage.textContent = '恭喜你，回答正确！';
                    resultDetails.textContent = `你成功完成了第${level.id}关: ${level.title}`;
                    
                    // 如果还没有完成过这一关，则添加到完成列表
                    if (!gameData.completedLevels.includes(level.id)) {
                        gameData.completedLevels.push(level.id);
                        updateProgressBar();
                        renderLevelGrid(); // 重新渲染关卡网格以显示新的完成状态
                    }
                    
                    // 显示下一关按钮（如果不是最后一关）
                    const nextLevelButton = document.getElementById('next-level-button');
                    if (level.id < 50 && nextLevelButton) {
                        nextLevelButton.style.display = 'inline-block';
                    }
                } else {
                    resultContainer.className = 'result-container result-failure';
                    resultIcon.textContent = '❌';
                    resultMessage.textContent = '回答错误，请再试一次！';
                    resultDetails.textContent = `正确答案是: ${level.answer}`;
                    
                    // 显示重新挑战按钮
                    const retryButton = document.getElementById('retry-button');
                    if (retryButton) {
                        retryButton.style.display = 'inline-block';
                    }
                }
            }
            
            showPage('result-page');
        }

        // 前往下一关
        function goToNextLevel() {
            try {
                if (gameData.currentLevel < 50) {
                    loadLevel(gameData.currentLevel + 1);
                }
            } catch (error) {
                console.error('前往下一关时出错:', error);
            }
        }

        // 重新挑战
        function retryLevel() {
            try {
                loadLevel(gameData.currentLevel);
            } catch (error) {
                console.error('重新挑战时出错:', error);
            }
        }

        // 渲染成就
        function renderAchievements() {
            try {
                const grid = document.getElementById('achievement-grid');
                if (!grid) return;
                
                grid.innerHTML = '';
                
                // 更新成就解锁状态
                achievements.forEach(achievement => {
                    if (achievement.id === 1 && gameData.completedLevels.length >= 1) {
                        achievement.unlocked = true;
                    } else if (achievement.id === 2 && gameData.completedLevels.length >= 10) {
                        achievement.unlocked = true;
                    } else if (achievement.id === 3 && gameData.completedLevels.length >= 25) {
                        achievement.unlocked = true;
                    } else if (achievement.id === 4 && gameData.completedLevels.length >= 50) {
                        achievement.unlocked = true;
                    } else if (achievement.id === 5 && gameData.completedLevels.length >= 5) {
                        // 这里简化处理，实际应该检查连续答对
                        achievement.unlocked = true;
                    }
                });
                
                achievements.forEach(achievement => {
                    const card = document.createElement('div');
                    card.className = `achievement-card ${achievement.unlocked ? 'unlocked' : ''}`;
                    card.innerHTML = `
                        <div class="achievement-icon">${achievement.icon}</div>
                        <h3 class="achievement-title">${achievement.title}</h3>
                        <p class="achievement-desc">${achievement.description}</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">${achievement.unlocked ? '已解锁' : '未解锁'}</p>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('渲染成就时出错:', error);
            }
        }

        // 初始化事件监听器
        function initEventListeners() {
            try {
                // 直接挑战第一关按钮
                const startLevel1Btn = document.getElementById('start-level-1');
                if (startLevel1Btn) {
                    startLevel1Btn.addEventListener('click', function() {
                        loadLevel(1);
                    });
                }

                // 关卡选择按钮
                const levelsButton = document.getElementById('levels-button');
                if (levelsButton) {
                    levelsButton.addEventListener('click', function() {
                        renderLevelGrid();
                        showPage('levels-page');
                    });
                }

                // 成就按钮
                const achievementsButton = document.getElementById('achievements-button');
                if (achievementsButton) {
                    achievementsButton.addEventListener('click', function() {
                        renderAchievements();
                        showPage('achievements-page');
                    });
                }

                // 返回按钮
                const backToStartBtn = document.getElementById('back-to-start');
                if (backToStartBtn) {
                    backToStartBtn.addEventListener('click', function() {
                        showPage('start-page');
                    });
                }

                const backToStart2Btn = document.getElementById('back-to-start-2');
                if (backToStart2Btn) {
                    backToStart2Btn.addEventListener('click', function() {
                        showPage('start-page');
                    });
                }

                const backToLevelsBtn = document.getElementById('back-to-levels');
                if (backToLevelsBtn) {
                    backToLevelsBtn.addEventListener('click', function() {
                        renderLevelGrid();
                        showPage('levels-page');
                    });
                }

                // 提交按钮
                const submitButton = document.getElementById('submit-button');
                if (submitButton) {
                    submitButton.addEventListener('click', function() {
                        checkAnswer();
                    });
                }

                // 成就页按钮
                const achievementsButton2 = document.getElementById('achievements-button-2');
                if (achievementsButton2) {
                    achievementsButton2.addEventListener('click', function() {
                        renderAchievements();
                        showPage('achievements-page');
                    });
                }

                // 关卡页按钮
                const levelsButton2 = document.getElementById('levels-button-2');
                if (levelsButton2) {
                    levelsButton2.addEventListener('click', function() {
                        renderLevelGrid();
                        showPage('levels-page');
                    });
                }

                // 回车键提交答案
                const answerInput = document.getElementById('answer-input');
                if (answerInput) {
                    answerInput.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            checkAnswer();
                        }
                    });
                }
            } catch (error) {
                console.error('初始化事件监听器时出错:', error);
            }
        }

        // 初始化游戏
        function initGame() {
            try {
                loadGameData();
                initEventListeners();
                renderLevelGrid();
                
                // 从用户未完成的第一关开始
                let nextLevel = 1;
                for (let i = 1; i <= 50; i++) {
                    if (!gameData.completedLevels.includes(i)) {
                        nextLevel = i;
                        break;
                    }
                }
                loadLevel(nextLevel);
            } catch (error) {
                console.error('初始化游戏时出错:', error);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initGame();
        });
    </script>
</body>
</html>
