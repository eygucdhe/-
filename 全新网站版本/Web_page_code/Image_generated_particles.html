<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南风工具箱</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="icon" href="../Picture/Repeating_Command_Block.png" type="image/webp">
    <link rel="stylesheet" href="../css/global.css">
    <script src="../js/particles.js"></script>
    <script src="../js/baidu_statistics.js"></script>
    <style>
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>  
    <div class="main-card">
        <h1>FUNCTION 图片粒子生成工具</h1>
        
        <div class="button-container">
            <button id="directionButton" class="btn">切换为平面模式</button>
            <button id="generateButton" class="btn" disabled>生成指令下载</button>
            <span id="fileCountHint" class="hint" aria-live="polite">0 个文件</span>
        </div>
        <div class="file-input-container">
            <button class="btn custom-file-btn" id="browseButton">选择图片</button>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>
        <div class="input-group">
            <label>
                图片尺寸（正方形像素）：
                <input type="number" id="sizeInput" class="form-control" value="100" min="10" max="500">
            </label>
        </div>
        <div class="input-group">
            <label>
                粒子密度：
                <input type="number" id="densityInput" class="form-control" value="5" min="1" max="20" step="0.1" placeholder="数值越小越密集">
            </label>
        </div>
        
        <div class="input-group">
            <label>
                坐标偏移（X Y Z）：
                <input type="text" id="coordinates" class="form-control" placeholder="例如：10 5 3" oninput="particleGenerator.validateCoordinates()">
                <span style="font-size: 0.8em; color: #666;">输入格式：X Y Z（用空格分隔三个数字）</span>
                <span id="coordinatesError" style="font-size: 0.8em; color: #dc3545; display: none;">坐标格式错误，请输入三个数字用空格分隔</span>
            </label>
        </div>
        
        <!-- 正方形画布容器 -->
        <div class="canvas-container">
            <canvas id="previewCanvas" width="500" height="500"></canvas>
        </div>
        
        <div class="note">
            温馨提示：图片将被调整为正方形，颜色、细节和亮度等保持不变
        </div>
    </div>

    <script>
        // 图片粒子生成工具主类
        class ParticleImageGenerator {
            constructor() {
                // DOM元素引用
            this.directionButton = document.getElementById('directionButton');
            this.generateButton = document.getElementById('generateButton');
            this.sizeInput = document.getElementById('sizeInput');
            this.densityInput = document.getElementById('densityInput');
            this.coordinatesInput = document.getElementById('coordinates');
            this.browseButton = document.getElementById('browseButton');
            this.imageInput = document.getElementById('imageInput');
            // 修复：统一变量名
            this.fileCountHint = document.getElementById('fileCountHint');
            this.previewCanvas = document.getElementById('previewCanvas');
            this.canvasContainer = this.previewCanvas.parentElement;
            this.ctx = this.previewCanvas.getContext('2d');
                
                // 应用状态
                this.isXZMode = false; // false: XY模式, true: XZ模式
                this.MAX_PER_FILE = 10000;
                this.tempImageData = null;
                this.originalImage = null; // 保存原始图片引用
                
                // 解析坐标输入
                this.parseCoordinates = function() {
                    const input = this.coordinatesInput.value.trim();
                    if (!input) {
                        return { offsetX: 0, offsetY: 0, offsetZ: 0 };
                    }
                    const parts = input.split(/\s+/);
                    const offsetX = parseFloat(parts[0]) || 0;
                    const offsetY = parseFloat(parts[1]) || 0;
                    const offsetZ = parseFloat(parts[2]) || 0;
                    return { offsetX, offsetY, offsetZ };
                };
                
                // 验证坐标输入
                this.validateCoordinates = function() {
                    const input = this.coordinatesInput.value.trim();
                    const errorElement = document.getElementById('coordinatesError');
                    
                    if (!input) {
                        errorElement.style.display = 'none';
                        return;
                    }
                    
                    const parts = input.split(/\s+/);
                    if (parts.length !== 3 || parts.some(part => isNaN(parseFloat(part)))) {
                        errorElement.style.display = 'inline';
                    } else {
                        errorElement.style.display = 'none';
                    }
                };
                
                // 初始化画布为正方形
                this.initCanvas();
                
                // 初始化
                this.initialize();
            }

            // 初始化正方形画布
            initCanvas() {
                // 设置画布尺寸为正方形
                const containerWidth = this.canvasContainer.clientWidth;
                this.previewCanvas.width = containerWidth;
                this.previewCanvas.height = containerWidth;
                
                // 窗口大小变化时重新设置画布尺寸
                window.addEventListener('resize', () => {
                    const newWidth = this.canvasContainer.clientWidth;
                    this.previewCanvas.width = newWidth;
                    this.previewCanvas.height = newWidth;
                    // 重新绘制图片保持正方形显示
                    if (this.originalImage) {
                        this.renderImagePreview(this.originalImage);
                    }
                });
            }

            // 初始化应用
            initialize() {
                // 设置事件监听器
                this.setupEventListeners();
                // 初始化UI状态
                this.updateButtonState();
            }

            // 设置事件监听器
            setupEventListeners() {
                // 方向切换按钮
                this.directionButton.addEventListener('click', () => this.toggleDirection());
                // 生成按钮
                this.generateButton.addEventListener('click', () => this.generateParticles());
                // 浏览按钮
                this.browseButton.addEventListener('click', () => this.imageInput.click());
                // 图片选择变化
                this.imageInput.addEventListener('change', () => this.handleImageChange());
                // 尺寸输入变化
                this.sizeInput.addEventListener('input', () => {
                    if (this.originalImage) {
                        this.renderImagePreview(this.originalImage);
                    }
                });
                // 密度输入变化
                this.densityInput.addEventListener('input', () => this.updateFileCount());
                // 阻止文本选择
                document.addEventListener('selectstart', (e) => e.preventDefault());
            }

            // 切换方向模式
            toggleDirection() {
                this.isXZMode =!this.isXZMode;
                this.directionButton.textContent = this.isXZMode? '切换为XZ模式' : '切换为XY模式';
                this.updatePreview();
            }

            // 处理图片选择变化
            handleImageChange() {
                const file = this.imageInput.files[0];
                if (!file) {
                    this.clearPreview();
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => this.loadImage(event.target.result);
                reader.readAsDataURL(file);
            }

            // 加载并显示图片
            loadImage(imageUrl) {
                const img = new Image();
                img.onload = () => {
                    this.originalImage = img; // 保存原始图片引用
                    this.renderImagePreview(img);
                    // 添加更新按钮状态的代码
                    this.updateButtonState();
                };
                img.src = imageUrl;
            }

            // 渲染图片预览 - 仅调整为正方形，保持其他元素不变
            renderImagePreview(img) {
                // 确保画布是正方形
                const canvasSize = this.previewCanvas.width;
                const targetSize = parseInt(this.sizeInput.value) || 100;
                
                // 清除画布（保持白色背景）
                this.ctx.fillStyle = 'white';
                this.ctx.fillRect(0, 0, canvasSize, canvasSize);
                
                // 计算缩放比例，保持图片原始比例
                const ratio = Math.min(canvasSize / img.width, canvasSize / img.height);
                const scaledWidth = img.width * ratio;
                const scaledHeight = img.height * ratio;

                // 计算居中位置
                const x = (canvasSize - scaledWidth) / 2;
                const y = (canvasSize - scaledHeight) / 2;

                // 绘制图片（居中显示，不拉伸，保持原始颜色和细节）
                this.ctx.drawImage(img, x, y, scaledWidth, scaledHeight);

                // 缓存处理后的图像数据（保持原始像素信息）
                this.cacheImageData(targetSize);
                // 更新文件数量
                this.updateFileCount();
            }

            // 缓存图片数据 - 保持原始像素信息
            cacheImageData(targetSize) {
                // 创建与目标尺寸一致的临时画布
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = targetSize;
                tempCanvas.height = targetSize;
                const tempCtx = tempCanvas.getContext('2d');
                
                // 填充白色背景
                tempCtx.fillStyle = 'white';
                tempCtx.fillRect(0, 0, targetSize, targetSize);
                
                // 按比例绘制原始图片
                const ratio = Math.min(targetSize / this.originalImage.width, targetSize / this.originalImage.height);
                const scaledWidth = this.originalImage.width * ratio;
                const scaledHeight = this.originalImage.height * ratio;
                const x = (targetSize - scaledWidth) / 2;
                const y = (targetSize - scaledHeight) / 2;
                
                tempCtx.drawImage(this.originalImage, x, y, scaledWidth, scaledHeight);
                
                // 获取保持原始像素信息的图像数据
                this.tempImageData = tempCtx.getImageData(0, 0, targetSize, targetSize).data;
            }

            // 清除预览
            clearPreview() {
                const canvasSize = this.previewCanvas.width;
                this.ctx.fillStyle = 'white';
                this.ctx.fillRect(0, 0, canvasSize, canvasSize);
                this.tempImageData = null;
                this.originalImage = null;
                // 这里已经正确使用了this.fileCountHint
                this.fileCountHint.textContent = "0 文件";
                this.generateButton.disabled = true;
            }

            // 更新文件数量显示
            updateFileCount() {
                if (!this.tempImageData) return;

                const size = parseInt(this.sizeInput.value) || 100;
                const density = parseFloat(this.densityInput.value) || 5;
                let darkPixelCount = 0;

                // 统计深色像素（RGB < 128）
                for (let i = 0; i < this.tempImageData.length; i += 4) {
                    const r = this.tempImageData[i];
                    const g = this.tempImageData[i+1];
                    const b = this.tempImageData[i+2];
                    if (r < 128 && g < 128 && b < 128) {
                        darkPixelCount++;
                    }
                }

                // 计算缩放后的粒子数量和文件数
                const scaledPixelCount = Math.floor(darkPixelCount);
                const particleCount = Math.floor(scaledPixelCount / (density * density));
                const fileCount = Math.max(1, Math.ceil(particleCount / this.MAX_PER_FILE));

                // 更新显示
                this.fileCountHint.textContent = `${fileCount} 文件`;
            }

            // 更新预览
            updatePreview() {
                if (this.originalImage) {
                    this.renderImagePreview(this.originalImage);
                }
            }

            // 生成粒子指令
            async generateParticles() {
                // 禁用按钮防止重复点击
                this.generateButton.disabled = true;
                this.generateButton.textContent = '正在生成...';

                try {
                    const size = parseInt(this.sizeInput.value) || 100;
                    const density = parseFloat(this.densityInput.value) || 5;
                    
                    // 创建临时画布用于生成最终指令
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = size;
                    tempCanvas.height = size;
                    const tempCtx = tempCanvas.getContext('2d');
                    
                    // 绘制最终尺寸的图片
                    const ratio = Math.min(size / this.originalImage.width, size / this.originalImage.height);
                    const scaledWidth = this.originalImage.width * ratio;
                    const scaledHeight = this.originalImage.height * ratio;
                    const x = (size - scaledWidth) / 2;
                    const y = (size - scaledHeight) / 2;
                    
                    tempCtx.fillStyle = 'white';
                    tempCtx.fillRect(0, 0, size, size);
                    tempCtx.drawImage(this.originalImage, x, y, scaledWidth, scaledHeight);
                    
                    const imageData = tempCtx.getImageData(0, 0, size, size);
                    const commands = [];

                    // 生成所有粒子指令
                    for (let i = 0; i < imageData.data.length; i += 4) {
                        const r = imageData.data[i];
                        const g = imageData.data[i+1];
                        const b = imageData.data[i+2];

                        // 跳过浅色像素
                        if (r >= 128 || g >= 128 || b >= 128) continue;

                        // 计算像素位置
                        const pixelIndex = i / 4;
                        const row = Math.floor(pixelIndex / size);
                        const col = pixelIndex % size;

                        // 获取坐标偏移值
                        const { offsetX, offsetY, offsetZ } = this.parseCoordinates();
                        
                        // 根据模式生成不同坐标
                        if (this.isXZMode) {
                            commands.push(`particle minecraft:endrod ^${(col / density + offsetX).toFixed(3)} ^${offsetY.toFixed(3)} ^${(row / density + offsetZ).toFixed(3)}`);
                        } else {
                            commands.push(`particle minecraft:endrod ^${(col / density + offsetX).toFixed(3)} ^${((size - row - 1) / density + offsetY).toFixed(3)} ^${offsetZ.toFixed(3)}`);
                        }
                    }

                    // 如果没有生成任何指令
            if (commands.length === 0) {
                console.warn('未检测到有效像素，请选择对比度更高的图片');
                this.updateButtonState();
                return;
            }

                    // 分批次创建文件
                    const batchCount = Math.max(1, Math.ceil(commands.length / this.MAX_PER_FILE));
                    const zip = new JSZip();

                    // 添加文件到压缩包
                    for (let i = 0; i < batchCount; i++) {
                        const start = i * this.MAX_PER_FILE;
                        const end = Math.min(start + this.MAX_PER_FILE, commands.length);
                        const batchContent = commands.slice(start, end).join('\n');
                        zip.file(`mc_particle_${i+1}.mcfunction`, batchContent);
                    }

                    // 生成压缩包并下载
                    const content = await zip.generateAsync({ type: "blob" });
                    this.downloadFile(content,'mc_particles.zip');

                    // 不显示成功消息
                } catch (error) {
                console.error('生成错误:', error);
            } finally {
                    // 恢复按钮状态
                    this.updateButtonState();
                }
            }

            // 下载文件
            downloadFile(content, fileName) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                // 清理
                setTimeout(() => {
                    document.body.removeChild(link);
                    URL.revokeObjectURL(link.href);
                }, 0);
            }



            // 更新按钮状态
            updateButtonState() {
                this.generateButton.disabled =!this.originalImage;
                this.generateButton.textContent = '生成指令下载';
            }
        }

        // 初始化应用
        window.addEventListener('DOMContentLoaded', () => {
            new ParticleImageGenerator();
        });
    </script>
