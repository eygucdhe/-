<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>南风工具箱</title>
  <link rel="icon" href="../Picture/Repeating_Command_Block.png" type="image/webp">
  <script src="../js/particles.js"></script>
  <script src="../js/baidu_statistics.js"></script>
  <link rel="stylesheet" href="../css/global.css">
</head>

<body class="error-body">
  <canvas id="canvas"></canvas>
  <div class="error-container">
    <img src="../Picture/Invicon_Barrier.png" alt="屏障" class="error-icon">
    <h1 class="error-h1">404 - 页面未找到</h1>
    <p class="error-p">很抱歉，您所请求的页面不存在。您可以尝试返回首页或检查输入的链接是否正确。等待开发中...</p>
  </div>

  <script>
    // 1. 阻止复制事件（可添加提示）
    document.addEventListener('copy', function (e) {
      // 针对h1元素单独处理
      if (e.target.tagName === 'H1') {
        e.preventDefault();
        alert("提示：为保护内容版权，禁止复制本页面内容！您可以手动记录相关信息。");
      }
      // 针对其他元素
      else {
        e.preventDefault();
        alert("提示：为保护内容版权，禁止复制本页面内容！您可以手动记录相关信息。");
      }
    });

    // 2. 禁用右键菜单
    document.addEventListener('contextmenu', function (e) {
      e.preventDefault();
    });

    // 3. 禁用复制/粘贴快捷键（Ctrl+C/V/X/S）
    document.addEventListener('keydown', function (e) {
      if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'x' || e.key ==='s')) {
        e.preventDefault();
      }
    });
  </script>
</body>

</html>
